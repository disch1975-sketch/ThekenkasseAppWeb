<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>VD2AppWebTest</title>

    <!-- Base-Href automatisch anpassen -->
    <base href="/" id="baseHref" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="images/appicon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
        (function () {
            var base = document.getElementById('baseHref');
            if (window.location.hostname.includes('github.io')) {
                base.setAttribute('href', '/VD2AppWebTest/');
            } else {
                base.setAttribute('href', '/');
            }
        })();
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="./css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="./VD2AppWebTest.styles.css" rel="stylesheet" />

    <!-- Animation CSS -->
    <link href="./css/Animation/rotate90.css" rel="stylesheet" />
    <link href="./css/Animation/sterneblinken.css" rel="stylesheet" />
    <link href="./css/Animation/zweimalblickrot.css" rel="stylesheet" />

    <!-- 🔥 Fade-Out Animation -->
    <style>
        body {
            margin: 0;
        }

        #loading-screen {
            opacity: 1;
            transition: opacity 0.4s ease;
        }

            #loading-screen.fade-out {
                opacity: 0;
            }
    </style>
</head>

<body>
    <!-- Startscreen -->
    <div id="app">
        <div id="loading-screen" style="
            background: url('images/carbon.png');
            background-size: cover;
            width: 100vw;
            height: 100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            color:white;
            font-family:sans-serif;
        ">
            <img src="images/vd2logo.png" style="width:220px; margin-bottom:20px;" />

            <div style="font-size:22px; margin-bottom:10px;">
                App lädt…
            </div>

            <div id="progressText" style="margin-bottom:10px; font-size:18px;">
                0%
            </div>

            <div style="
                width:220px;
                height:12px;
                background:#444;
                border-radius:6px;
                overflow:hidden;">
                <div id="progressBar" style="
                    width:0%;
                    height:100%;
                    background:greenyellow;
                    transition: width 0.2s;">
                </div>
            </div>
        </div>
    </div>

    <!-- Fehler UI -->
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Deine JS -->
    <script src="dartliga.js"></script>
    <script src="inactivity.js"></script>

    <!-- 🔧 Lade-Logik -->
    <script>
        let progress = 0;
        let interval;

        function startFakeLoading() {
            interval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 5;
                    if (progress > 90) progress = 90;
                    updateProgress(progress);
                }
            }, 200);
        }

        function updateProgress(value) {
            const bar = document.getElementById("progressBar");
            const text = document.getElementById("progressText");

            if (bar) bar.style.width = value + "%";
            if (text) text.innerText = Math.floor(value) + "%";
        }

        function finishLoading() {
            clearInterval(interval);
            updateProgress(100);

            const loader = document.getElementById("loading-screen");

            // 👉 Fade-Out starten
            loader.classList.add("fade-out");

            // 👉 danach komplett entfernen
            setTimeout(() => {
                loader.style.display = "none";
            }, 400);
        }

        startFakeLoading();
    </script>

    <!-- Blazor -->
    <script src="./_framework/blazor.webassembly.js"></script>
    <script>
        Blazor.start().then(() => {
            finishLoading();
        });
    </script>
</body>
</html>
