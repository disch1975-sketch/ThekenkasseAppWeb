<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>ThekenkasseAppWeb</title>

    <base href="/" id="baseHref" />

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="images/appicon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <script>
        (function () {
            var base = document.getElementById('baseHref');
            if (window.location.hostname.includes('github.io')) {
                base.setAttribute('href', '/ThekenkasseAppWeb/');
            } else {
                base.setAttribute('href', '/');
            }
        })();
    </script>

    <link rel="stylesheet" href="./css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="./ThekenkasseAppWeb.styles.css" rel="stylesheet" />

    <link href="./css/Animation/rotate90.css" rel="stylesheet" />
    <link href="./css/Animation/sterneblinken.css" rel="stylesheet" />
    <link href="./css/Animation/zweimalblickrot.css" rel="stylesheet" />

    <style>
        body {
            margin: 0;
        }

        #loading-screen {
            opacity: 1;
            transition: opacity 0.4s ease;
        }

            #loading-screen.fade-out {
                opacity: 0;
            }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('images/carbon.png');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: start;
            padding-top: 10px;
            color: white;
            font-family: sans-serif;
        }

        .login-container {
            width: 400px;
            text-align: center;
        }

        .logo-frame {
            background-color: white;
            padding: 5px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .startpage-logo img {
            width: 300px;
            height: auto;
            border-radius: 20px;
        }

        .loading-bar-container {
            width: 220px;
            height: 12px;
            background: #444;
            border-radius: 6px;
            overflow: hidden;
            margin: 10px auto;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: greenyellow;
            transition: width 0.2s;
        }

        .loading-percent {
            margin-top: 5px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div id="app">
        <div id="loading-screen">

            <div class="background">

                <div class="login-container">

                    <!-- LOGO (EXAKT wie Login) -->
                    <div class="logo-frame startpage-logo">
                        <img src="images/vd2logo.png" alt="Logo" />
                    </div>

                    <!-- Text -->
                    <div style="font-size:22px; margin-bottom:10px;">
                        App wird vorbereitet…
                    </div>

                    <!-- Prozent -->
                    <div id="progressText" class="loading-percent">
                        0%
                    </div>

                    <!-- Bar -->
                    <div class="loading-bar-container">
                        <div id="progressBar" class="loading-bar-fill"></div>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="dartliga.js"></script>
    <script src="inactivity.js"></script>

    <script>
        let progress = 0;
        let interval;

        function startFakeLoading() {
            interval = setInterval(() => {
                if (progress < 90) {
                    progress += Math.random() * 5;
                    if (progress > 90) progress = 90;
                    updateProgress(progress);
                }
            }, 200);
        }

        function updateProgress(value) {
            const bar = document.getElementById("progressBar");
            const text = document.getElementById("progressText");

            if (bar) bar.style.width = value + "%";
            if (text) text.innerText = Math.floor(value) + "%";
        }

        function finishLoading() {
            clearInterval(interval);
            updateProgress(100);

            const loader = document.getElementById("loading-screen");
            loader.classList.add("fade-out");

            setTimeout(() => {
                loader.style.display = "none";
            }, 400);
        }

        startFakeLoading();
    </script>

    <script src="./_framework/blazor.webassembly.js"></script>
    <script>
        Blazor.start().then(() => {
            finishLoading();
        });
    </script>

</body>
</html>
